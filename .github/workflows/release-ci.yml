name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-frontend:
    name: Build Frontend (WASM)
    runs-on: ubuntu-22.04
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Install trunk and wasm target
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install trunk --locked

      - name: Install wasm-opt 129
        run: |
          wget https://github.com/WebAssembly/binaryen/releases/download/version_129/binaryen-version_129-x86_64-linux.tar.gz
          tar -xzf binaryen-version_129-x86_64-linux.tar.gz
          sudo mv binaryen-version_129/bin/wasm-opt /usr/local/bin/
          wasm-opt --version

      - name: Build frontend
        working-directory: crates/rustmail_panel
        run: trunk build --release --dist ../rustmail/static --config Trunk.toml

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: crates/rustmail/static
          retention-days: 1

  build-and-test:
    name: Build & Test
    needs: build-frontend
    runs-on: ubuntu-22.04
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: crates/rustmail/static

      - name: Build
        run: cargo build --verbose -p rustmail

      - name: Test
        run: cargo test --verbose -p rustmail

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GT_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          if [[ "$tag" == *alpha* || "$tag" == *beta* ]]; then
              prerelease="--prerelease"
          else
              prerelease=""
          fi

          gh release create "$tag" \
          --repo="$GITHUB_REPOSITORY" \
          --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
          --generate-notes $prerelease

  upload-assets:
    name: Upload ${{ matrix.target }}
    needs: [create-release, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (glibc) ──
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          # ── Linux x86_64 (musl / static) ──
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          # ── Linux ARM64 (glibc) ──
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          # ── Linux ARM64 (musl / static) ──
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
          # ── macOS Intel (cross-compiled on Apple Silicon) ──
          - target: x86_64-apple-darwin
            os: macos-14
          # ── macOS Apple Silicon ──
          - target: aarch64-apple-darwin
            os: macos-14
          # ── Windows x64 ──
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: rustup update stable && rustup default stable

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: crates/rustmail/static

      - name: Verify static files
        run: ls crates/rustmail/static
        shell: bash

      - name: Install musl-tools (musl targets)
        if: contains(matrix.target, 'musl') && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rustmail
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GT_TOKEN }}

  docker-build-push:
    name: Build & Push Docker Image
    needs: upload-assets
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux binaries from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin/amd64 bin/arm64

          # x86_64 (amd64)
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern 'rustmail-x86_64-unknown-linux-gnu.tar.gz'
          tar -xzf rustmail-x86_64-unknown-linux-gnu.tar.gz
          mv rustmail bin/amd64/
          rm rustmail-x86_64-unknown-linux-gnu.tar.gz

          # aarch64 (arm64)
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern 'rustmail-aarch64-unknown-linux-gnu.tar.gz'
          tar -xzf rustmail-aarch64-unknown-linux-gnu.tar.gz
          mv rustmail bin/arm64/
          rm rustmail-aarch64-unknown-linux-gnu.tar.gz

          chmod +x bin/amd64/rustmail bin/arm64/rustmail
          echo "=== amd64 ===" && file bin/amd64/rustmail
          echo "=== arm64 ===" && file bin/arm64/rustmail

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

